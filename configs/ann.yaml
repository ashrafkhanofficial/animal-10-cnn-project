# ===========================
# Dataset
# ===========================

image_size: 224

train_split: 0.70
val_split: 0.15
test_split: 0.15

mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

# ===========================
# DataLoader
# ===========================

batch_size: 32
num_workers: 2
pin_memory: true

# ===========================
# Training
# ===========================

epochs: 20
learning_rate: 0.001

# ===========================
# ANN
# ===========================

hidden_dims: [512, 256]

activation: relu

dropout: 0.2

use_batchnorm: true