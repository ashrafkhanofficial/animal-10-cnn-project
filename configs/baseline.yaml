image_size: 224

batch_size: 32

train_split: 0.70
val_split: 0.15
test_split: 0.15

num_workers: 2
pin_memory: true

learning_rate: 0.001
epochs: 20

optimizer: adam
weight_decay: 0.0001

model: custom_cnn

mean:
  - 0.485
  - 0.456
  - 0.406

std:
  - 0.229
  - 0.224
  - 0.225


# ANN Configuration
hidden_dims:
  - 512
  - 256

activation: relu
dropout: 0.2
use_batchnorm: true